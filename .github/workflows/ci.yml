name: CI

on:
  push:
    branches: [master]
    tags-ignore: ['v*']
  pull_request:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings
