name: CI

on:
  push:
    branches: [master]
    tags-ignore: ['v*']
  pull_request:

jobs:
  checks:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings
