repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^src-tauri/gen/
      - id: trailing-whitespace
        exclude: ^src-tauri/gen/

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [ts, tsx, css]

      - id: eslint
        name: eslint
        entry: npx eslint
        language: system
        types_or: [ts, tsx]
        files: ^src/

      - id: tsc
        name: tsc
        entry: npx tsc --noEmit
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path src-tauri/Cargo.toml --
        language: system
        types: [rust]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
