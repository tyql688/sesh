ci:
  autofix_commit_msg: "style: auto-fix by pre-commit.ci"
  autofix_prs: true
  autoupdate_branch: master
  autoupdate_schedule: monthly
  autoupdate_commit_msg: "chore: auto-update pre-commit hooks"
  skip:
    - eslint
    - tsc
    - cargo-fmt
    - cargo-clippy

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^src-tauri/gen/
      - id: trailing-whitespace
        exclude: ^src-tauri/gen/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, css]

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint
        language: system
        types_or: [ts, tsx]
        files: ^src/

      - id: tsc
        name: tsc
        entry: npx tsc --noEmit
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path src-tauri/Cargo.toml --
        language: system
        types: [rust]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
