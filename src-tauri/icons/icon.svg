<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- White rounded square background -->
  <rect width="512" height="512" rx="112" fill="#ffffff"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- S in blue-purple gradient -->
  <path d="M 305 138
           C 270 118, 190 125, 180 168
           C 170 212, 250 232, 265 256
           C 280 280, 342 300, 332 344
           C 322 388, 242 395, 207 375"
        fill="none" stroke="url(#sg)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small accent dots -->
  <circle cx="308" cy="140" r="8" fill="#007aff" opacity="0.4"/>
  <circle cx="204" cy="374" r="8" fill="#7c3aed" opacity="0.4"/>
